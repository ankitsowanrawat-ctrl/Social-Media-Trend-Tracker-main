services:
  - type: web
    name: social-media-trend-tracker
    env: python
    plan: free
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
